name: 'stripe_lap'
version: '1.0.0'
config-version: 2


profile: 'stripe_lap'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

on-run-end:
  #- "{{ log_dbt_results(results) }}"

vars:
  "dbt_date:time_zone": "Asia/Ho_Chi_Minh"
  stripe_lookback_days: 3
  # stripe_start_ts: Unix timestamp đầu cửa sổ incremental.
  # Được truyền qua --vars từ Airflow (build_time_window).
  # Default = 0 (1970-01-01) → quét toàn bộ khi chạy thủ công không truyền --vars.
  stripe_start_ts: 0

models:
  stripe_lap:
    stripe_stg:
      +materialized: incremental
      +incremental_strategy: merge
